# Конфигурация MariaDB для продакшн
spring.datasource.url=jdbc:mariadb://mariadb:3306/taskdb
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# Конфигурация JPA
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Конфигурация Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Продакшен настройки для Redis
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Настройки пула соединений Redis для продакшена
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# Настройки кэширования для продакшена
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Настройки Kafka для продакшена
spring.kafka.bootstrap-servers=kafka:9092 